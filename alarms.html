<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarms - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/phosphor-icons"></script>
</head>
<body class="bg-white font-sans">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-stone-100">
            <div class="p-6">
                <div class="mb-8">
                    <div class="mb-4">
                        <img src="Logo.png" alt="Logo" style="width: 40.2px; height: 32px; object-fit: cover;">
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">Smithson Franchises Ltd.</div>
                        <div class="flex items-center space-x-1">
                            <span class="text-sm font-medium text-gray-900">Cutter Lane</span>
                            <div class="flex flex-col">
                                <i class="ph-caret-up text-xs text-gray-400"></i>
                                <i class="ph-caret-down text-xs text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <nav class="space-y-2">
                    <a href="index.html" class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                        <i class="ph-house text-lg"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="reports.html" class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                        <i class="ph-chart-bar text-lg"></i>
                        <span>Reports</span>
                    </a>
                    <a href="actions.html" class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                        <i class="ph-play text-lg"></i>
                        <span>Actions</span>
                    </a>
                    <a href="alarms.html" class="flex items-center space-x-3 px-3 py-2 bg-white rounded-lg text-gray-900">
                        <i class="ph-warning text-lg"></i>
                        <span>Alarms</span>
                    </a>
                    <a href="history.html" class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                        <i class="ph-clock-clockwise text-lg"></i>
                        <span>History</span>
                    </a>
                    <a href="settings.html" class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                        <i class="ph-gear text-lg"></i>
                        <span>Settings</span>
                    </a>
                </nav>
            </div>
            
            <!-- Annotations section -->
            <div class="absolute bottom-0 left-0 w-64 p-6">
                <div class="text-sm font-medium text-gray-900 mb-2">Annotations</div>
                <div class="text-xs text-gray-500 mb-4">We have launched a new way to add annotations and notes to time series.</div>
                <a href="#" class="flex items-center space-x-2 text-sm text-gray-600 hover:text-gray-900">
                    <i class="ph-question text-lg"></i>
                    <span>Support</span>
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-8">Alarms</h1>
            <div class="bg-white p-8 rounded-lg shadow border text-center">
                <i class="ph-warning text-4xl text-gray-400 mb-4"></i>
                <p class="text-gray-500">Alarms page content will be added here.</p>
            </div>
        </div>
    </div>
</body>
</html>
